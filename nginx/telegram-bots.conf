# Nginx server block for Telegram Bots webhook
# Copy to: /etc/nginx/sites-available/telegram-bots
# Symlink: ln -s /etc/nginx/sites-available/telegram-bots /etc/nginx/sites-enabled/
#
# This proxies webhook requests from Telegram to the Node.js process on port 3003.
# SSL is handled by Let's Encrypt (certbot).
#
# IMPORTANT: Replace YOURDOMAIN.duckdns.org with the actual domain.

server {
    listen 80;
    server_name YOURDOMAIN.duckdns.org;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOURDOMAIN.duckdns.org;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/YOURDOMAIN.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Bot 1 webhook — Personal Assistant
    location /webhook/bot1 {
        proxy_pass http://127.0.0.1:3003/webhook/bot1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bot 2 webhook — Receipt Tracker
    location /webhook/bot2 {
        proxy_pass http://127.0.0.1:3003/webhook/bot2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:3003/health;
        proxy_set_header Host $host;
    }

    # Block all other paths — only webhook and health exposed
    location / {
        return 404;
    }
}
