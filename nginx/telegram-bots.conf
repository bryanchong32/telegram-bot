# Nginx location blocks for Telegram Bots webhook
#
# RECOMMENDED: Add these location blocks to the existing ecomwave.duckdns.org
# server block (already has SSL). The webhook paths won't conflict with the CRM.
#
# Add to: /etc/nginx/sites-available/ecomwave (inside the server { listen 443 } block)
#
# Alternatively, if using a separate domain, create a standalone server block
# (see DEPLOY.md for instructions).

# ─── Add these inside the existing HTTPS server block ───

# Bot 1 webhook — Personal Assistant
location /webhook/bot1 {
    proxy_pass http://127.0.0.1:3003/webhook/bot1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Bot 2 webhook — Receipt Tracker
location /webhook/bot2 {
    proxy_pass http://127.0.0.1:3003/webhook/bot2;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Bot health check endpoint (accessible at /bot-health to avoid conflict with CRM /health)
location /bot-health {
    proxy_pass http://127.0.0.1:3003/health;
    proxy_set_header Host $host;
}
